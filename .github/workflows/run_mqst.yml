name: Run MQST

on:
  pull_request:

jobs:
  install_and_test:

    runs-on: ubuntu-latest

    defaults:
      run:
        shell: bash

    container:
      image: ghcr.io/dune-daq/nightly-release-alma9:development_v5

    steps:
      - name: Set up dev nightly
        if: ${{ !cancelled() }}
        run: |
          mkdir nightly
          cd nightly
          source /cvmfs/dunedaq.opensciencegrid.org/setup_dunedaq.sh
          setup_dbt latest_v5
          dbt-create -n last_fddaq
          cd NFD_DEV*
          source env.sh
          dbt-build
          dbt-workarea-env

      - name: Install druncschema and drunc
        if: success()
        run: |
          cd nightly/NFD_DEV* || true
          source env.sh
          python -m pip install --upgrade pip
          git clone https://github.com/DUNE-DAQ/druncschema.git -b ${{ github.ref_name }} ||  git clone https://github.com/DUNE-DAQ/druncschema.git
          git clone https://github.com/DUNE-DAQ/drunc.git -b ${{ github.ref_name }}
          cd druncschema
          pip install .
          cd -
          cd drunc
          pip install .
          echo "DRUNC_DIR=$(pwd)" >> $GITHUB_ENV

      - name: Test with pytest/pytest-cov
        if: success()
        run: |
          cd nightly/NFD_DEV* || true
          source env.sh
          daqsystemtest_integtest_bundle.sh -l 0